<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gameflix</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial, Helvetica, sans-serif;
    background:#141414;
    color:white;
}

/* NAVBAR */
.navbar {
    position:fixed;
    top:0;
    width:100%;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    z-index:1000;
}

.logo {
    color:#e50914;
    font-size:28px;
    font-weight:bold;
}

.menu {
    display:flex;
    gap:20px;
    font-size:14px;
}

.menu span {
    cursor:pointer;
    transition:0.3s;
}

.menu span:hover {
    color:#b3b3b3;
}

/* BANNER */
.banner {
    height:60vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:flex-end;
    padding:60px;
    position:relative;
    margin-bottom:40px;
}

.banner::after {
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, #141414 10%, transparent 60%);
}

.banner-content {
    position:relative;
    z-index:2;
    max-width:600px;
}

.banner h1 {
    font-size:50px;
    margin-bottom:10px;
}

.banner p {
    font-size:16px;
    margin-bottom:20px;
    color:#ddd;
}

/* ROWS */
.container {
    padding:0 50px 50px 50px;
}

.row {
    margin-bottom:40px;
}

.row h2 {
    margin-bottom:15px;
}

.row-posters {
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:10px;
}

.poster {
    width:200px;
    height:300px;
    background-size:cover;
    background-position:center;
    border-radius:4px;
    cursor:pointer;
    transition:transform 0.3s ease;
}

.poster:hover {
    transform:scale(1.1);
}

/* MODAL */
.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:10000;
}

.modal-content {
    width:80%;
    max-height:80%;
    position:relative;
    background:#141414;
    padding:20px;
    border-radius:8px;
    overflow-y:auto;
    color:white;
}

.close {
    position:absolute;
    top:10px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">GAMEFLIX</div>
    <div class="menu">
        <span>Início</span>
        <span>Jogos</span>
        <span>Novidades</span>
        <span>Minha Lista</span>
    </div>
</div>

<!-- BANNER -->
<div class="banner" id="banner">
    <div class="banner-content">
        <h1 id="bannerTitle"></h1>
        <p id="bannerDesc"></p>
    </div>
</div>

<!-- ROWS -->
<div class="container">
    <div class="row">
        <h2>Populares</h2>
        <div class="row-posters" id="row1"></div>
    </div>

    <div class="row">
        <h2>RPG</h2>
        <div class="row-posters" id="row2"></div>
    </div>

    <div class="row">
        <h2>Ação/Aventura</h2>
        <div class="row-posters" id="row3"></div>
    </div>

    <div class="row">
        <h2>FPS</h2>
        <div class="row-posters" id="row4"></div>
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">×</span>
        <h2 id="gameTitle"></h2>
        <p id="gameDescription"></p>
    </div>
</div>

<script>
const games = [
{title:"Cyberpunk 2077", image:"https://upload.wikimedia.org/wikipedia/en/9/9f/Cyberpunk_2077_box_art.jpg", desc:"RPG futurista em Night City."},
{title:"Red Dead Redemption 2", image:"https://upload.wikimedia.org/wikipedia/en/4/44/Red_Dead_Redemption_II.jpg", desc:"Velho Oeste em mundo aberto."},
{title:"Elden Ring", image:"https://upload.wikimedia.org/wikipedia/en/b/b9/Elden_Ring_Box_art.jpg", desc:"Fantasia sombria desafiadora."},
{title:"GTA V", image:"https://upload.wikimedia.org/wikipedia/en/a/a5/Grand_Theft_Auto_V.png", desc:"Crime e mundo aberto em Los Santos."},
{title:"The Witcher 3", image:"https://upload.wikimedia.org/wikipedia/en/0/0c/Witcher_3_cover_art.jpg", desc:"Aventura épica de RPG com Geralt."},
{title:"Assassin's Creed Valhalla", image:"https://upload.wikimedia.org/wikipedia/en/4/48/Assassin%27s_Creed_Valhalla_cover.jpg", desc:"Explore a era viking em mundo aberto."},
{title:"Far Cry 6", image:"https://upload.wikimedia.org/wikipedia/en/1/16/Far_Cry_6_cover_art.jpg", desc:"FPS em um mundo tropical fictício."},
{title:"Horizon Zero Dawn", image:"https://upload.wikimedia.org/wikipedia/en/0/00/Horizon_Zero_Dawn.jpg", desc:"Aventura com robôs gigantes em um mundo pós-apocalíptico."},
{title:"Resident Evil Village", image:"https://upload.wikimedia.org/wikipedia/en/0/09/Resident_Evil_Village.png", desc:"Terror de sobrevivência aterrorizante."},
{title:"Death Stranding", image:"https://upload.wikimedia.org/wikipedia/en/e/e8/Death_Stranding_cover.jpg", desc:"Aventura estranha e única de Hideo Kojima."},
{title:"Control", image:"https://upload.wikimedia.org/wikipedia/en/d/d2/Control_cover_art.jpg", desc:"Ação sobrenatural em prédio misterioso."},
{title:"DOOM Eternal", image:"https://upload.wikimedia.org/wikipedia/en/0/0b/DOOM_Eternal.jpg", desc:"FPS rápido e sangrento."},
{title:"Hitman 3", image:"https://upload.wikimedia.org/wikipedia/en/d/d1/Hitman_3_cover_art.jpg", desc:"Assassino silencioso em missões globais."},
{title:"Ghost of Tsushima", image:"https://upload.wikimedia.org/wikipedia/en/a/a2/Ghost_of_Tsushima_cover.jpg", desc:"Samurai contra invasores mongóis."},
{title:"Monster Hunter: World", image:"https://upload.wikimedia.org/wikipedia/en/0/0b/Monster_Hunter_World_cover.jpg", desc:"Caça monstros gigantescos."},
{title:"Final Fantasy XV", image:"https://upload.wikimedia.org/wikipedia/en/2/21/Final_Fantasy_XV_cover_art.jpg", desc:"Aventura épica no universo Final Fantasy."},
{title:"Overwatch", image:"https://upload.wikimedia.org/wikipedia/en/5/51/Overwatch_cover_art.jpg", desc:"FPS multiplayer competitivo."},
{title:"League of Legends", image:"https://upload.wikimedia.org/wikipedia/en/7/7c/League_of_Legends_cover.jpg", desc:"MOBA famoso mundialmente."},
{title:"Valorant", image:"https://upload.wikimedia.org/wikipedia/en/9/91/Valorant_cover_art.jpg", desc:"FPS tático online."},
{title:"Minecraft", image:"https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png", desc:"Construção e sobrevivência em blocos."}
];

let featuredGame = games[0];

function loadBanner() {
    document.getElementById("banner").style.backgroundImage = `url(${featuredGame.image})`;
    document.getElementById("bannerTitle").innerText = featuredGame.title;
    document.getElementById("bannerDesc").innerText = featuredGame.desc;
}

function loadRows() {
    const row1 = document.getElementById("row1");
    const row2 = document.getElementById("row2");
    const row3 = document.getElementById("row3");
    const row4 = document.getElementById("row4");

    // Distribuindo jogos em categorias (exemplo simples)
    games.forEach((game, i) => {
        const poster = createPoster(game);
        if(i<5) row1.appendChild(poster);
        else if(i<10) row2.appendChild(poster);
        else if(i<15) row3.appendChild(poster);
        else row4.appendChild(poster);
    });
}

function createPoster(game) {
    const poster = document.createElement("div");
    poster.className = "poster";
    poster.style.backgroundImage = `url(${game.image})`;

    poster.addEventListener("click", () => {
        document.getElementById("modal").style.display="flex";
        document.getElementById("gameTitle").innerText = game.title;
        document.getElementById("gameDescription").innerText = game.desc;
    });

    return poster;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

loadBanner();
loadRows();
</script>

</body>
</html>
