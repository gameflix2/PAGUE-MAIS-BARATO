<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFERTA ESPECIAL - GAMEFLIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; }
        .hard-box { border: 2px solid #E50914; background: linear-gradient(180deg, #121212 0%, #000 100%); }
        .video-container { box-shadow: 0 0 20px rgba(229, 9, 20, 0.2); border: 1px solid #222; position: relative; }
        
        .btn-super-glow {
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.8), 0 0 60px rgba(229, 9, 20, 0.4);
            overflow: hidden;
        }

        .btn-super-glow::after {
            content: '';
            position: absolute;
            top: -50%; left: -150%;
            width: 200%; height: 200%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.5) 50%, rgba(255, 255, 255, 0) 100%);
            transform: rotate(30deg);
            animation: shine-light 3s infinite;
        }

        @keyframes shine-light {
            0% { left: -150%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .btn-super-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(229, 9, 20, 1), 0 0 80px rgba(229, 9, 20, 0.6);
            filter: brightness(1.2);
        }

        /* Botão de Ativar Áudio Flutuante */
        #mute-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 10; cursor: pointer;
        }
        .unmute-btn {
            background: #E50914; color: white; padding: 10px 20px;
            border-radius: 50px; font-weight: bold; font-size: 14px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-center">

    <div class="w-full max-w-lg mb-6 leading-none">
        <h2 class="text-3xl md:text-3xl font-black tracking-tighter italic mb-2">
            <span class="text-white block mb-1">QUER COMPRAR ESSE JOGO</span>
            <span class="text-[#E50914] block">POR APENAS R$ 1,65?</span>
        </h2>
        <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mt-3">
           OFERTA RELAMPAGO: <span id="countdown" class="text-white">05:00</span>
        </p>
    </div>

    <div class="w-full max-w-md hard-box p-6 md:p-8 rounded-3xl shadow-[0_0_60px_rgba(229,9,20,0.3)]">
        
        <h3 class="text-xl font-black mb-4 uppercase italic tracking-tighter text-white">VEJA COMO NO VÍDEO</h3>
        
        <div class="w-full video-container rounded-xl overflow-hidden aspect-video mb-8 bg-zinc-900">
            <div id="mute-overlay" onclick="unmuteVideo()">
                <div class="unmute-btn">🔊 CLIQUE PARA ATIVAR O SOM</div>
            </div>
            
            <div id="player"></div>
        </div>

        <a href="https://gameflix2.github.io/CHECKOUT-GAMEFLIX--PAY/" class="btn-super-glow block w-full bg-[#E50914] text-white font-black text-2xl py-5 rounded-xl uppercase italic tracking-tighter">
            SIM! QUERO COMBO ULTIMATE
        </a>

        <a href="https://gameflix2.github.io/ESCOLHA-SEU-PACK/" class="block mt-6 text-zinc-600 text-[10px] uppercase font-bold hover:text-zinc-400 underline tracking-widest">
            Não, prefiro escolher outro !
        </a>
    </div>

    <p class="mt-10 text-zinc-800 text-[9px] font-bold uppercase tracking-[0.3em]">
        Processamento Seguro • Mercado Pago • Gameflix 2026
    </p>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const videoID = 'ID_DO_SEU_VIDEO'; // COLOQUE O ID DO SEU VÍDEO AQUI

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoID,
                playerVars: {
                    'autoplay': 1,
                    'controls': 0, // Remove botões
                    'rel': 0,
                    'showinfo': 0,
                    'modestbranding': 1,
                    'loop': 1,
                    'mute': 1, // Precisa iniciar mudo para o autoplay funcionar
                    'playlist': videoID
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        function unmuteVideo() {
            player.unMute();
            player.seekTo(0); // Recomeça o vídeo
            player.playVideo();
            document.getElementById('mute-overlay').style.display = 'none';
        }

        // Timer
        let time = 300; 
        const display = document.getElementById('countdown');
        setInterval(() => {
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            display.innerHTML = `0${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            if (time > 0) time--;
        }, 1000);
    </script>
</body>
</html>
